spec_version: "1.0.0"
env_id: "adaptive-crisis-env"
entrypoint: "server/app.py"
version: "4.0.0"
description: >
  An Enterprise-Grade, Multi-Zone POMDP for routing emergency response
  across distributed geographical clusters tracking weather and traffic latency.

author: "Meta Principal Systems Architect"
license: "Apache-2.0"

metadata:
  engine: "Meta Llama 3.3 via Groq"
  mathematical_standout:
    state_space:
      definition: 'S \in [0, 1]^{12}'
      description: >
        Normalized vector representing 12 critical crisis metrics: 
        (Flood Level, Power Grid, Population Density, Fire Severity, 
        Patient Criticality, Traffic Congestion, Wind Speed, 
        Infrastructure Integrity, Supply Chain Latency, 
        Communication Uptime, Medical Capacity, Unit Readiness).
    action_space:
      definition: 'A \in T \times U \times Z \times \mathbb{N}_0'
      description: >
        Composite structured space where T={dispatch, stabilize, control}, 
        U={fire, medical, police}, Z=Active Zones, and N=Resource Quantities.
    stochasticity_descriptors:
      transition_probability: "P(s' | s, a)"
      chaos_factor: "\\chi"
      description: >
        This is a non-deterministic environment where actions have probabilistic 
        outcomes modulated by a dynamic Chaos Factor (\\chi).

interface:
  reset: "Returns initial Observation for a new episode"
  step:  "Takes Action, returns (Observation, reward, done, info)"
  state: "Returns full EnvironmentState at any point"

# Directive 4 Compliant: Epistemic Strictness enforced. No hidden simulation metadata.
observation_space:
  type: structured
  schema: "env.models.Observation"
  fields:
    weather:
      type: enum
      values: [clear, storm, hurricane]
      description: "Global weather modifier affecting all zones equally"
    zones:
      type: object
      description: "Maps zone_id (str) to ZoneState"
      value_schema:
        fire:
          type: enum
          values: [none, low, medium, high, catastrophic]
        patient:
          type: enum
          values: [none, moderate, critical, fatal]
        traffic:
          type: enum
          values: [low, heavy, gridlock]
    idle_resources:
      type: object
      schema: "env.models.ResourcePool"
      fields:
        fire_units: {type: int, minimum: 0}
        ambulances:  {type: int, minimum: 0}
        police:      {type: int, minimum: 0}
    busy_resources:
      type: object
      schema: "env.models.ResourcePool"
      fields:
        fire_units: {type: int, minimum: 0}
        ambulances:  {type: int, minimum: 0}
        police:      {type: int, minimum: 0}
    task_level:
      type: enum
      values: [easy, medium, hard]

action_space:
  type: structured
  schema: "env.models.Action"
  fields:
    type: 
      type: enum
      values: [dispatch, stabilize, control_traffic]
    unit:
      type: enum
      values: [fire_truck, ambulance, police]
    zone_id:
      type: str
    amount:
      type: int
      minimum: 0

reward:
  type: scalar
  range: [-inf, +inf]
  components:
    efficiency: "Dynamic payload scaling per discrete zone allocation"
    hazard_penalty: "Penalty for unresolved or escalating incidents"
    cascade_penalty: "Penalty for triggering cascading failure events"

tasks:
  task_1_easy:
    id: 1
    name: "Single-Zone Emergency"
    difficulty: easy
    description: "One active zone, clear weather, limited resources."
  task_2_medium:
    id: 2
    name: "Multi-Zone Weather Chaos"
    difficulty: medium
    description: "Multiple simultaneous zones under storm conditions."
  task_3_hard:
    id: 3
    name: "City-Wide Meta Triage"
    difficulty: hard
    description: "All zones active under hurricane conditions with scarce resources."

grading:
  formula: "(Success Rate * 0.50) + (Minimal Wastage Efficiency * 0.50)"
  success_threshold: 0.5

runtime:
  type: docker
  language: python
  version: ">=3.10"
  api_entry_point: "server/app.py"
  docker_image: "crisis-management-env:latest"
  api_port: 7860
  resource_profile:
    vcpus: 2
    ram: "4GB"
  required_secrets:
    - "GROQ_API_KEY"

dependencies:
  - "pydantic>=2.0.0"
  - "numpy>=1.24.0"
  - "pyyaml>=6.0"
  - "openai>=1.0.0"
  - "fastapi>=0.100.0"
  - "uvicorn>=0.22.0"
