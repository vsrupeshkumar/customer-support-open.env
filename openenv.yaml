spec_version: "1.0.0"
env_id: "adaptive-crisis-env"
entrypoint: "server/app.py"
version: "4.1.0"
description: >
  An Enterprise-Grade, Multi-Zone POMDP for routing emergency response
  across distributed geographical clusters tracking weather and traffic latency.

author: "Anbu-00001"
license: "MIT"

features:
  session_isolation: true
  adaptive_curriculum: true
  domain_grounding:
    fire_severity_mapping: "FEMA Incident Command System (ICS) Type 1-5"
    patient_triage_mapping: "UN OCHA Cluster Protocol L2/L3"
    seismicity_scale: "Modified Mercalli Intensity Scale (I-X)"
    resource_units: "FEMA Type-1 USAR Task Force / ALS Ambulance Units"
    references:
      - "FEMA NIMS: https://www.fema.gov/emergency-managers/nims/components"
      - "UN OCHA IASC: https://interagencystandingcommittee.org/system-wide-emergency-activation"

metadata:
  tags: [reinforcement-learning, crisis-management, resource-allocation, pomdp]
  difficulty_ranges:
    easy: "1 zone, clear weather (Task 1)"
    medium: "2 zones, storm weather (Task 2)"
    hard: "5 zones, hurricane weather, non-stationary mechanics (Task 3)"
  observation_type: "structured-dict"
  engine: "HF Router (OpenAI-Compatible)"
  mathematical_standout:
    state_space:
      definition: 'S \in \mathcal{W} \times (\mathcal{F} \times \mathcal{M} \times \mathcal{T})^{3} \times \mathbb{N}_0^6'
      description: >
        Composite discrete state space where W=Weather (3), F=FireLevel (5), M=PatientLevel (4),
        T=TrafficLevel (3), and 6 pools of idle/busy resources represented by non-negative integers.
    action_space:
      definition: 'A \in T \times U \times Z \times \mathbb{N}_0'
      description: >
        Composite structured space where T={dispatch, stabilize, control}, 
        U={fire, medical, police}, Z=Active Zones, and N=Resource Quantities.
    stochasticity_descriptors:
      transition_probability: "P(s' | s, a)"
      chaos_factor: "\\chi"
      description: >
        This is a non-deterministic environment where actions have probabilistic 
        outcomes modulated by a dynamic Chaos Factor (\\chi).

interface:
  reset: "Returns initial Observation for a new episode"
  step:  "Takes Action, returns (Observation, reward, done, info)"
  state: "Returns full EnvironmentState at any point"

# Directive 4 Compliant: Epistemic Strictness enforced. No hidden simulation metadata.
observation_space:
  type: structured
  schema: "env.models.Observation"
  fields:
    weather:
      type: enum
      values: [clear, storm, hurricane]
      description: "Global weather modifier affecting all zones equally"
    zones:
      type: object
      description: "Maps zone_id (str) to ZoneState"
      value_schema:
        fire:
          type: enum
          values: [none, low, medium, high, catastrophic]
        patient:
          type: enum
          values: [none, moderate, critical, fatal]
        traffic:
          type: enum
          values: [low, heavy, gridlock]
    idle_resources:
      type: object
      schema: "env.models.ResourcePool"
      fields:
        fire_units: {type: int, minimum: 0}
        ambulances:  {type: int, minimum: 0}
        police:      {type: int, minimum: 0}
    busy_resources:
      type: object
      schema: "env.models.ResourcePool"
      fields:
        fire_units: {type: int, minimum: 0}
        ambulances:  {type: int, minimum: 0}
        police:      {type: int, minimum: 0}
    task_level:
      type: enum
      values: [easy, medium, hard]

action_space:
  type: structured
  schema: "env.models.Action"
  description: >
    A structured dispatch decision for one simulation step.
    The agent maps each active zone_id to a ZoneDispatch object specifying
    how many fire units, ambulances, and police to send.
    Total dispatched must NOT exceed idle_resources in each category
    (Inventory Breach Guard: violation voids the action and applies -15 × severity penalty).
  fields:
    allocations:
      type: object
      description: "Maps zone_id (str key) to a ZoneDispatch object. Include all zones."
      required: true
      value_schema:
        dispatch_fire:
          type: int
          minimum: 0
          maximum: 50
          description: "Fire units to dispatch to this zone."
        dispatch_ambulance:
          type: int
          minimum: 0
          maximum: 50
          description: "Ambulances to dispatch to this zone."
        control_traffic:
          type: bool
          description: "true to deploy one police unit for traffic control."
    public_broadcast_message:
      type: [string, "null"]
      description: >
        Optional natural-language alert to citizens. Required when any zone
        has HIGH/CATASTROPHIC fire or CRITICAL patients. Must name the zone,
        hazard type, and include a directive verb (evacuate/shelter/avoid/warning).

reward:
  type: scalar
  range: [-inf, +inf]
  components:
    base_dispatch_score: "Quality of resource allocation vs required thresholds per zone"
    nlp_semantic_bonus: "Precision-recall scored broadcast message grader (can be negative)"
    waste_penalty: "Severity-weighted over-dispatch accumulator (×2.0 calm / ×0.5 critical)"
    efficiency_bonus: "Bonus for rapid multi-zone containment"
    time_penalty: "Per-step cost when unresolved incidents remain active"
    multi_obj: "Multi-objective POMDP term combining Δ-severity trajectory shaping"
    loop_penalty: "Penalty (δ=3.0) for repeating the same action within a 3-step sliding window"

tasks:
  - name: "Single-Zone Emergency (Easy)"
    difficulty: "easy"
    description: "One active zone, clear weather, limited resources."
    success_threshold: 0.50
    max_steps: 12
  - name: "Multi-Zone Weather Chaos (Medium)"
    difficulty: "medium"
    description: "Multiple simultaneous zones under storm conditions."
    success_threshold: 0.50
    max_steps: 15
  - name: "City-Wide Meta Triage (Hard)"
    difficulty: "hard"
    description: >
      Five zones (Downtown, Suburbs, Industrial, Harbor, Residential) active under
      hurricane conditions with scarce resources (6 fire / 3 ambulances).
      Features inter-zone cascading severity, resource depletion every 4 steps,
      and non-stationary disaster spawning via a Non-Homogeneous Poisson Process (NHPP).
    success_threshold: 0.50
    max_steps: 25

grading:
  formula: "(0.50 * success_rate) + (0.30 * efficiency) + (0.20 * resource_usage)"
  success_threshold: 0.5
  weights:
    success_rate: 0.50
    efficiency: 0.30
    resource_usage: 0.20
  constants:
    optimal_reward_per_incident: 8.0
    worst_reward_per_incident: -9.0
    max_waste_per_incident: 5.0

runtime:
  type: docker
  language: python
  version: ">=3.10"
  api_entry_point: "server/app.py"
  docker_image: "crisis-management-env:latest"
  api_port: 7860
  resource_profile:
    vcpus: 2
    ram: "8GB"
  required_secrets:
    - "HF_TOKEN"

dependencies:
  - "pydantic>=2.0.0"
  - "numpy>=1.24.0"
  - "pyyaml>=6.0"
  - "openai>=1.0.0"
  - "fastapi>=0.100.0"
  - "uvicorn>=0.22.0"
  - "python-dotenv>=1.0.0"
  - "requests>=2.28.0"
  - "openenv-core"
